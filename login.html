<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الإبداع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        
        :root {
            --primary-orange: #FFF7ED;
            --primary-orange-dark: #FED7AA;
            --primary-orange-accent: #F97316;
            --secondary-cyan: #06B6D4;
            --accent-blue: #2563EB;
        }

        body {
            background: linear-gradient(135deg, var(--primary-orange) 0%, #FFEDD5 50%, var(--primary-orange) 100%);
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 237, 213, 0.8);
        }

        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #E5E7EB;
        }
        
        .input-field:focus {
            border-color: var(--primary-orange-accent);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-orange-accent), #EA580C);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
        }

        .social-btn {
            transition: all 0.3s ease;
            border: 2px solid #E5E7EB;
        }
        
        .social-btn:hover {
            border-color: var(--secondary-cyan);
            background: rgba(6, 182, 212, 0.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .animate-float { animation: float 3s ease-in-out infinite; }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary-orange-accent) 0%, var(--secondary-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-6xl grid lg:grid-cols-2 gap-8 items-center">
        
        <!-- Left Side - Visual -->
        <div class="hidden lg:block relative">
            <div class="relative w-full aspect-square max-w-md mx-auto animate-float">
                <div class="absolute inset-0 bg-gradient-to-br from-orange-200 via-cyan-100 to-blue-100 rounded-3xl transform rotate-6 opacity-60"></div>
                <div class="absolute inset-0 bg-white rounded-3xl shadow-2xl p-8 flex flex-col justify-center items-center text-center">
                    <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-white text-4xl mb-6 shadow-lg">
                        <i class="fas fa-palette"></i>
                    </div>
                    <h2 class="text-3xl font-black mb-4 gradient-text">أهلاً بعودتك!</h2>
                    <p class="text-gray-600 text-lg">سجل دخولك واستمر في إبداعك</p>
                    
                    <!-- Decorative Elements -->
                    <div class="absolute -top-4 -right-4 w-16 h-16 bg-cyan-400 rounded-full flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-sparkles"></i>
                    </div>
                    <div class="absolute -bottom-4 -left-4 w-20 h-20 bg-blue-500 rounded-2xl flex items-center justify-center text-white shadow-lg rotate-12">
                        <i class="fas fa-rocket text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Form -->
        <div class="glass rounded-3xl p-8 md:p-12 shadow-2xl">
            <!-- Logo -->
            <div class="flex items-center gap-2 mb-8 justify-center lg:justify-start">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-white font-bold text-xl shadow-lg">
                    <i class="fas fa-palette"></i>
                </div>
                <span class="text-2xl font-bold gradient-text">منصة الإبداع</span>
            </div>

            <h1 class="text-3xl font-black text-gray-800 mb-2 text-center lg:text-right">تسجيل الدخول</h1>
            <p class="text-gray-500 mb-8 text-center lg:text-right">أدخل بياناتك للوصول إلى حسابك</p>

            <form id="loginForm" class="space-y-5">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">البريد الإلكتروني</label>
                    <div class="relative">
                        <input type="email" id="email" class="input-field w-full px-5 py-4 rounded-xl bg-gray-50 outline-none text-right" placeholder="name@example.com" required>
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">كلمة المرور</label>
                    <div class="relative">
                        <input type="password" id="password" class="input-field w-full px-5 py-4 rounded-xl bg-gray-50 outline-none text-right" placeholder="••••••••" required>
                        <button type="button" id="togglePassword" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-orange-600 transition-colors">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember & Forgot -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-orange-500 focus:ring-orange-500">
                        <span class="text-sm text-gray-600">تذكرني</span>
                    </label>
                    <a href="#" class="text-sm text-cyan-600 hover:text-cyan-700 font-medium">نسيت كلمة المرور؟</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg">
                    دخول
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500">أو</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button class="social-btn py-3 rounded-xl flex items-center justify-center gap-2 font-medium text-gray-700">
                    <i class="fab fa-google text-red-500"></i>
                    Google
                </button>
                <button class="social-btn py-3 rounded-xl flex items-center justify-center gap-2 font-medium text-gray-700">
                    <i class="fab fa-apple text-gray-900"></i>
                    Apple
                </button>
            </div>

            <!-- Sign Up Link -->
            <p class="mt-8 text-center text-gray-600">
                ليس لديك حساب؟
                <a href="signup.html" class="text-orange-600 font-bold hover:text-orange-700 transition-colors">سجل الآن</a>
            </p>

            <!-- Back to Home -->
            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-right"></i>
                    العودة للرئيسية
                </a>
            </div>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulate login - redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
